name: Guardrails Check

on: [pull_request]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: npm install --no-save tsx ts-morph

      - name: AST contract validation
        run: npx tsx scripts/enforce_contract_shape_ast.ts

      - name: Guardrail auto-detection
        run: npx tsx scripts/detect_unregistered_protected_surfaces.ts
